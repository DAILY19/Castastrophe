<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Castastrophe!</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!-- ======== HOME VIEW ======== -->
  <div id="view-home" class="view active">
    <div class="container">
      <h1 class="title">Castastrophe!</h1>
      <p class="subtitle">Multiplayer party game</p>

      <div class="card">
        <input type="text" id="player-name" class="input" placeholder="Your Name" maxlength="16" autocomplete="off">

        <button id="btn-create" class="btn btn-primary">Create Room</button>

        <div class="divider"><span>or</span></div>

        <input type="text" id="room-code-input" class="input" placeholder="Room Code" maxlength="6" autocomplete="off" style="text-transform: uppercase;">
        <button id="btn-join" class="btn btn-secondary">Join Room</button>
      </div>

      <p id="home-error" class="error-msg"></p>
    </div>
  </div>

  <!-- ======== LOBBY VIEW ======== -->
  <div id="view-lobby" class="view">
    <div class="container">
      <h2 class="title">Lobby</h2>
      <div class="room-code-display">
        Room Code: <span id="lobby-room-code" class="room-code"></span>
      </div>

      <div id="player-list" class="player-list"></div>

      <div id="host-controls" class="host-controls" style="display: none;">
        <button id="btn-start-game" class="btn btn-primary">Start Game</button>
      </div>

      <p id="lobby-status" class="status-msg">Waiting for host to start...</p>
      <button id="btn-leave" class="btn btn-danger btn-sm">Leave Room</button>
    </div>
  </div>

  <!-- ======== GAME VIEW ======== -->
  <!-- Your game content goes here -->
  <div id="view-game" class="view">
    <div class="container">
      <div id="game-message" class="game-message"></div>
    </div>
  </div>

  <!-- ======== RESULTS VIEW ======== -->
  <div id="view-results" class="view">
    <div class="container">
      <h2 class="title" id="results-title">Results</h2>
      <div id="results-list" class="results-list"></div>
      <p id="results-status" class="status-msg"></p>
    </div>
  </div>

  <!-- ======== FINAL SCOREBOARD VIEW ======== -->
  <div id="view-scoreboard" class="view">
    <div class="container">
      <h2 class="title">Final Scores</h2>
      <div id="final-scores" class="results-list"></div>
      <button id="btn-play-again" class="btn btn-primary">Play Again</button>
      <button id="btn-home" class="btn btn-secondary">Home</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
