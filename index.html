<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Kepler Klicker</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700;800&family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- ======== BACKGROUND LAYERS ======== -->
  <div id="bg-layers">
    <div class="bg-layer" id="bg-void"></div>
    <div class="bg-layer" id="bg-stars-1"></div>
    <div class="bg-layer" id="bg-stars-2"></div>
  </div>

  <!-- ======== FLOATING NUMBERS CONTAINER ======== -->
  <div id="float-numbers"></div>

  <!-- ======== HEADER ======== -->
  <header id="header">
    <h1 class="title">Kepler Klicker</h1>
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">Stardust</span>
        <span class="stat-value" id="stardust-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">per second</span>
        <span class="stat-value" id="per-second">0</span>
      </div>
    </div>
  </header>

  <!-- ======== MAIN GAME AREA ======== -->
  <main id="game-area">
    <div id="planet-wrapper">
      <div id="planet" role="img" aria-label="Planet"></div>
    </div>
  </main>

  <!-- ======== UPGRADE SHOP ======== -->
  <aside id="shop">
    <div class="shop-header">
      <h2>Upgrades</h2>
      <button id="btn-toggle-shop" class="btn-icon-only" aria-label="Toggle shop">&#9650;</button>
    </div>
    <div id="shop-list" class="shop-list"></div>
  </aside>

  <!-- ======== SETTINGS BAR ======== -->
  <div id="settings-bar">
    <button id="btn-music" class="btn-icon" title="Toggle music">
      <img src="assets/UI/Buttons/BTNs/Music_BTN.png" alt="Music" draggable="false">
    </button>
    <button id="btn-sfx" class="btn-icon" title="Toggle sound effects">
      <img src="assets/UI/Buttons/BTNs_Active/Sound_BTN.png" alt="SFX" draggable="false">
    </button>
    <button id="btn-next-track" class="btn-icon" title="Next music track">
      <img src="assets/UI/Buttons/BTNs/Forward_BTN.png" alt="Next track" draggable="false">
    </button>
    <button id="btn-reset" class="btn-icon" title="Reset game">
      <img src="assets/UI/Buttons/BTNs/Replay_BTN.png" alt="Reset" draggable="false">
    </button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
